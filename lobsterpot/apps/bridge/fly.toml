app = "lobsterpot-bridge"
primary_region = "ord"

[build]
  dockerfile = "apps/bridge/Dockerfile"

[env]
  LOBSTERPOT_BRIDGE_PORT = "3000"
  LOBSTERPOT_DB_PATH = "/data/lobsterpot.db"

[[mounts]]
  source = "lobsterpot_data"
  destination = "/data"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/healthz"
