name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-typecheck:
    name: Swift typecheck (macOS SDK)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Typecheck Swift sources
        # Full iOS SDK requires Xcode + provisioning; typechecking on the macOS SDK
        # catches the vast majority of type errors and works on any macOS runner.
        run: |
          MACOS_SDK=$(xcrun --show-sdk-path --sdk macosx)
          swiftc -typecheck \
            -sdk "$MACOS_SDK" \
            -target arm64-apple-macosx13.0 \
            apps/ios/LobsterPot/KeychainHelper.swift \
            apps/ios/LobsterPot/Models.swift \
            apps/ios/LobsterPot/Gateway/GatewayFrames.swift \
            apps/ios/LobsterPot/Gateway/DeviceIdentity.swift \
            apps/ios/LobsterPot/Workspace/Workspace.swift
