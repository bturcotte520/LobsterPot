version: "3.9"

services:
  bridge:
    build:
      context: .
      dockerfile: apps/bridge/Dockerfile
    ports:
      - "3000:3000"
    environment:
      LOBSTERPOT_BRIDGE_PORT: "3000"
      LOBSTERPOT_PUBLIC_BASE_URL: "http://127.0.0.1:3000"
      LOBSTERPOT_DB_PATH: "/data/lobsterpot.db"
      LOBSTERPOT_PUSH_RELAY_URL: "http://relay:3100"
      LOBSTERPOT_PUSH_RELAY_TOKEN: "${LOBSTERPOT_RELAY_ADMIN_TOKEN:-dev-relay-token}"
      LOBSTERPOT_APNS_BUNDLE_ID: "${LOBSTERPOT_APNS_BUNDLE_ID:-}"
    volumes:
      - bridge-data:/data
    depends_on:
      - relay

  relay:
    build:
      context: .
      dockerfile: apps/push-relay/Dockerfile
    ports:
      - "3100:3100"
    environment:
      LOBSTERPOT_RELAY_PORT: "3100"
      LOBSTERPOT_RELAY_ADMIN_TOKEN: "${LOBSTERPOT_RELAY_ADMIN_TOKEN:-dev-relay-token}"
      LOBSTERPOT_RELAY_DB_PATH: "/data/relay.db"
      LOBSTERPOT_APNS_TEAM_ID: "${LOBSTERPOT_APNS_TEAM_ID:-}"
      LOBSTERPOT_APNS_KEY_ID: "${LOBSTERPOT_APNS_KEY_ID:-}"
      LOBSTERPOT_APNS_BUNDLE_ID: "${LOBSTERPOT_APNS_BUNDLE_ID:-}"
      LOBSTERPOT_APNS_PRIVATE_KEY_PATH: "${LOBSTERPOT_APNS_PRIVATE_KEY_PATH:-}"
      LOBSTERPOT_APNS_PRODUCTION: "${LOBSTERPOT_APNS_PRODUCTION:-false}"
    volumes:
      - relay-data:/data

volumes:
  bridge-data:
  relay-data:
