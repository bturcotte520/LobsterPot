services:
  bridge:
    build:
      context: .
      dockerfile: apps/bridge/Dockerfile
    environment:
      LOBSTERPOT_BRIDGE_PORT: "3000"
      LOBSTERPOT_PUBLIC_BASE_URL: "http://127.0.0.1:3000"
      LOBSTERPOT_DB_PATH: "/data/lobsterpot.db"
      LOBSTERPOT_PUSH_RELAY_URL: "http://push-relay:3100"
    ports:
      - "3000:3000"
    volumes:
      - bridge-data:/data

  push-relay:
    build:
      context: .
      dockerfile: apps/push-relay/Dockerfile
    environment:
      LOBSTERPOT_RELAY_PORT: "3100"
      LOBSTERPOT_RELAY_ADMIN_TOKEN: "dev-relay-token"
    ports:
      - "3100:3100"

volumes:
  bridge-data:
